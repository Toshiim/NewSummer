services:
  api:
    container_name: newsummer-app
    build:
      context: .
      dockerfile: Presentation/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=newsummer;Username=postgres;Password=postgres
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: newsummer_postgres
    environment:
      POSTGRES_DB: newsummer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: